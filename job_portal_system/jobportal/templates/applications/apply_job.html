{% extends "base.html" %}

{% block title %}Apply for {{ job.title }} | JobPortal{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: flex-start; min-height: 70vh; padding-top: 3rem;">
    <div class="card" style="width: 100%; max-width: 600px;">
        <h1 class="text-gradient" style="font-size: 2rem; margin-bottom: 0.5rem;">Apply for {{ job.title }}</h1>
        <p style="color: var(--primary); font-weight: 600; margin-bottom: 2rem;">{{ job.company_name }}</p>
        
        <div style="background: rgba(15, 23, 42, 0.4); border-radius: var(--radius-md); padding: 1.5rem; margin-bottom: 2.5rem; border: 1px solid var(--surface-border);">
            <h3 style="font-size: 1rem; color: var(--text-dim); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em;">Job Description Highlights</h3>
            <p style="color: var(--text-main); font-size: 0.95rem; line-height: 1.7;">
                {{ job.description|truncatewords:50 }}
            </p>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="resume" class="form-label" style="font-size: 1.1rem; margin-bottom: 1rem;">Upload Your Resume (PDF Only)</label>
                <div style="background: rgba(15, 23, 42, 0.5); border: 2px dashed var(--surface-border); border-radius: var(--radius-lg); padding: 3rem 2rem; text-align: center; cursor: pointer; transition: var(--transition);" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--surface-border)'">
                    <input type="file" name="resume" id="resume" accept=".pdf" required style="cursor: pointer; opacity: 0; position: absolute; width: 0; height: 0;">
                    <label for="resume" style="cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                        <span style="font-size: 3rem; opacity: 0.5;">📄</span>
                        <span style="font-weight: 600; color: var(--text-main);" id="file-label">Click to browse or drag and drop</span>
                        <span style="font-size: 0.85rem; color: var(--text-dim);">Max file size: 5MB</span>
                    </label>
                </div>
            </div>

            <div style="margin-top: 3rem; display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2; padding: 1rem; font-size: 1.1rem;">Submit Application</button>
                <a href="{% url 'candidate_dashboard' %}" class="btn btn-outline" style="flex: 1; padding: 1rem;">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('resume').addEventListener('change', function(e) {
        if (this.files && this.files[0]) {
            document.getElementById('file-label').textContent = 'Selected: ' + this.files[0].name;
            document.getElementById('file-label').style.color = 'var(--secondary)';
        }
    });
</script>
{% endblock %}
