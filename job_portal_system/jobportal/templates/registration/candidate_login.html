{% extends "base.html" %}

{% block title %}Candidate Login | JobPortal{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="card" style="width: 100%; max-width: 450px;">
        <h1 class="text-gradient" style="text-align: center; font-size: 2rem; margin-bottom: 0.5rem;">Welcome back</h1>
        <p style="text-align: center; color: var(--text-dim); margin-bottom: 2rem;">Login to your Candidate account</p>
        
        {% if error %}
            <div style="background: rgba(244, 63, 94, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 0.8rem; border-radius: var(--radius-md); margin-bottom: 1.5rem; text-align: center; font-size: 0.9rem;">
                {{ error }}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Login as Candidate</button>
            </div>
        </form>
        
        <div style="margin-top: 1.5rem; text-align: center; border-top: 1px solid var(--surface-border); padding-top: 1.5rem;">
            <p style="color: var(--text-dim); font-size: 0.9rem;">
                Not a candidate? <a href="{% url 'recruiter_login' %}" style="color: var(--secondary); text-decoration: none; font-weight: 600;">Login as Recruiter</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
